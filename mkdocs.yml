site_name: Shoes Pilot — Guide utilisateur
site_description: >-
  Manuel utilisateur de Shoes Pilot, le MES de suivi de production pour usines
  de chaussures. Parcours illustrés pour opérateurs, superviseurs et administrateurs.
site_author: Visuel Concept
site_url: https://visuelconcept.github.io/shoes-pilot-docs/

docs_dir: user-docs
copyright: © Visuel Concept — Shoes Pilot

extra_css:
  - assets/extra.css

theme:
  name: material
  language: fr
  logo: assets/siemens-logo-white.svg
  favicon: assets/favicon.ico
  font:
    text: Segoe UI
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom   # Siemens Petrol (#009999) — défini dans extra.css
      accent: custom    # Siemens cyan (#00bde3)
      toggle:
        icon: material/weather-night
        name: Passer en thème sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Passer en thème clair
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - fr
        - pt
  - glightbox  # zoom plein écran sur les captures d'écran
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: fr
          name: Français
          default: true
          build: true
          site_name: Shoes Pilot — Guide utilisateur
        - locale: pt
          name: Português
          build: true
          site_name: Shoes Pilot — Guia do utilizador
          nav_translations:
            Accueil: Início
            Prise en main: Primeiros passos
            Parcours: Percursos
            Aide: Ajuda

nav:
  - Accueil: index.md
  - Prise en main:
      - prise-en-main/roles-et-acces.md
      - prise-en-main/se-connecter.md
  - Parcours:
      - parcours/operateur-pointage.md
      - parcours/declaration-rebut.md
      - parcours/supervision.md
      - parcours/configuration-of.md
  - Aide:
      - aide/glossaire.md
      - aide/faq.md
